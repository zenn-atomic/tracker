<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker Perjalanan</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:linear-gradient(135deg,#1e3c72,#2a5298);min-height:100vh;padding:20px}
.card{max-width:500px;margin:auto;background:#fff;border-radius:20px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.2)}
h1{text-align:center;color:#2a5298;margin-bottom:15px}
.box{background:#f4f6fa;border-radius:15px;padding:12px;margin-bottom:10px}
.label{font-size:13px;color:#666}
.value{font-size:24px;font-weight:bold}
#gps{font-size:14px}
#map{height:300px;border-radius:15px;overflow:hidden;margin:15px 0}
.buttons{display:flex;gap:10px}
button{flex:1;border:none;padding:12px;border-radius:10px;color:white;font-weight:bold;cursor:pointer}
.start{background:#28a745}.stop{background:#dc3545}.reset{background:#007bff}
.status{text-align:center;margin-top:12px;color:#555}
</style>
</head>
<body>

<div class="card">
<h1>📍 Tracker Perjalanan</h1>

<div class="box">
<div class="label">Jarak Tempuh</div>
<div class="value" id="distance">0.00 KM</div>
</div>

<div class="box">
<div class="label">Kecepatan</div>
<div class="value" id="speed">0.0 KM/J</div>
</div>

<div class="box">
<div class="label">Koordinat GPS</div>
<div id="gps">Menunggu GPS...</div>
</div>

<div id="map"></div>

<div class="buttons">
<button class="start" onclick="startTracking()">Mulai</button>
<button class="stop" onclick="stopTracking()">Stop</button>
<button class="reset" onclick="resetData()">Reset</button>
</div>

<div class="status" id="status">Memuat lokasi...</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let watchId=null,tracking=false,totalDistance=0,lastPosition=null,path=[];

const map=L.map('map').setView([-7.39,109.36],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'© OpenStreetMap'
}).addTo(map);

let marker=null;
const route=L.polyline([], {weight:5}).addTo(map);

if(navigator.geolocation){
 navigator.geolocation.getCurrentPosition(
  pos=>{
   const lat=pos.coords.latitude;
   const lon=pos.coords.longitude;
   map.setView([lat,lon],16);
   marker=L.marker([lat,lon]).addTo(map);
   document.getElementById("gps").textContent=lat.toFixed(6)+", "+lon.toFixed(6);
   document.getElementById("status").textContent="Lokasi ditemukan";
  },
  err=>{
   document.getElementById("status").textContent="GPS gagal: "+err.message;
   marker=L.marker([-7.39,109.36]).addTo(map);
  },
  {enableHighAccuracy:true,timeout:10000}
 );
}

function haversine(lat1,lon1,lat2,lon2){
 const R=6371;
 const dLat=(lat2-lat1)*Math.PI/180;
 const dLon=(lon2-lon1)*Math.PI/180;
 const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
 return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function startTracking(){
 if(tracking)return;
 tracking=true;
 document.getElementById("status").textContent="Tracking aktif...";

 watchId=navigator.geolocation.watchPosition(
  pos=>{
   const lat=pos.coords.latitude;
   const lon=pos.coords.longitude;

   document.getElementById("gps").textContent=lat.toFixed(6)+", "+lon.toFixed(6);

   let speed=(pos.coords.speed||0)*3.6;
   document.getElementById("speed").textContent=speed.toFixed(1)+" KM/J";

   if(lastPosition){
    const d=haversine(lastPosition.lat,lastPosition.lon,lat,lon);
    if(d>0.01){
      totalDistance+=d;
      document.getElementById("distance").textContent=totalDistance.toFixed(2)+" KM";
    }
   }

   lastPosition={lat,lon};
   path.push([lat,lon]);

   if(marker) marker.setLatLng([lat,lon]);
   else marker=L.marker([lat,lon]).addTo(map);

   route.setLatLngs(path);
   map.panTo([lat,lon]);
  },
  err=>{
   document.getElementById("status").textContent="GPS gagal: "+err.message;
  },
  {enableHighAccuracy:true,maximumAge:0,timeout:10000}
 );
}

function stopTracking(){
 if(watchId) navigator.geolocation.clearWatch(watchId);
 tracking=false;
 document.getElementById("status").textContent="Tracking dihentikan";
}

function resetData(){
 stopTracking();
 totalDistance=0;
 lastPosition=null;
 path=[];
 route.setLatLngs([]);
 document.getElementById("distance").textContent="0.00 KM";
 document.getElementById("speed").textContent="0.0 KM/J";
 document.getElementById("gps").textContent="Menunggu GPS...";
 document.getElementById("status").textContent="Data direset";
}
</script>
</body>
</html>
